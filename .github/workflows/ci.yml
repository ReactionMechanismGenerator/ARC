name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-test:
    name: CI and Functional Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout ARC
        uses: actions/checkout@v4
        with:
          path: ARC

      - name: Clean Ubuntu Image
        uses: kfir4444/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up micromamba (arc_env)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: arc_env
          environment-file: ARC/environment.yml
          cache-environment: true
          cache-downloads: true
          generate-run-shell: true

      - name: Export ARC paths
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          echo "PATH=$PATH:$PWD" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$PYTHONPATH:$PWD" >> "$GITHUB_ENV"

      - name: Install RMG-Py + database
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          bash devtools/install_rmg.sh
          echo "RMG_PY_PATH=$(realpath ../RMG-Py)"       >> $GITHUB_ENV
          echo "RMG_DB_PATH=$(realpath ../RMG-database)" >> $GITHUB_ENV
          echo "PATH=$(realpath ../RMG-Py):$PATH"        >> $GITHUB_ENV
          echo "PYTHONPATH=$(realpath ../RMG-Py):$PYTHONPATH" >> $GITHUB_ENV

      - name: Cache RMG-Py source
        uses: actions/cache@v4
        with:
          path: RMG-Py
          key: ${{ runner.os }}-rmgpy-${{ hashFiles('ARC/devtools/install_rmg.sh') }}
          restore-keys: ${{ runner.os }}-rmgpy-

      - name: Show what micromamba knows about envs
        shell: micromamba-shell {0}
        run: |
          echo "micromamba env list:"
          micromamba env list
          echo "-----"
          echo "grep for rmg_env:"
          micromamba env list | grep rmg_env || echo "(no match)"
          echo "-----"
          echo "Check whether the directory exists anyway:"
          ls -ld ${MAMBA_ROOT_PREFIX:-$HOME/micromamba}/envs/rmg_env || echo "(directory missing)"


      - name: Install all extras - CI
        shell: micromamba-shell {0}
        working-directory: ARC
        run: make install-ci

      - name: Run Unit Tests
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          echo "Running Unit Tests..."
          export PYTHONPATH="${{ github.workspace }}/molecule:${{ github.workspace }}/AutoTST:${{ github.workspace }}/KinBot:$PYTHONPATH"
          pytest arc/ --cov --cov-report=xml -ra -vv

      - name: Run Functional Tests
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          echo "Running Functional Tests..."
          export PYTHONPATH="${{ github.workspace }}/molecule:${{ github.workspace }}/AutoTST:${{ github.workspace }}/KinBot:$PYTHONPATH"
          pytest functional/ -ra -vv

      - name: Upload coverage data
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ARC/coverage.xml
          flags: unittests,functionaltests
          name: codecov-umbrella
          verbose: true
          fail_ci_if_error: false
