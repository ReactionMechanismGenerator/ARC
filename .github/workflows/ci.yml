name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-test:
    name: CI and Functional Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout ARC
        uses: actions/checkout@v6
        with:
          path: ARC

      - name: Clean Ubuntu Image
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up micromamba (arc_env)
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: arc_env
          environment-file: ARC/environment.yml
          cache-environment: true
          cache-downloads: true
          generate-run-shell: true

      - name: Install conda in micromamba base
        shell: micromamba-shell {0}
        run: |
          echo "::group::Install conda in micromamba base"
          micromamba install -n base -c conda-forge conda
          echo "::endgroup::"

      - name: Export ARC paths
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          echo "PATH=$PATH:$PWD" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$PYTHONPATH:$PWD" >> "$GITHUB_ENV"

      - name: Install Julia 1.10
        shell: micromamba-shell {0}
        run: |
          echo "::group::Install juliaup + Julia 1.10"
          # 1) Bootstrap juliaup non-interactively (-y)
          curl -fsSL https://install.julialang.org | sh -s -- -y
          # 2) Make juliaup visible *now* (CI shells won’t re-source rc files)
          export PATH="$HOME/.juliaup/bin:$PATH"
          # 3) Install & select Julia 1.10
          juliaup add 1.10
          juliaup default 1.10
          # 4) Persist for subsequent steps
          echo "PATH=$HOME/.juliaup/bin:$PATH" >> "$GITHUB_ENV"
          echo "::endgroup::"
          julia --version # Check that Julia is installed correctly

      - name: Install all extras - CI
        shell: micromamba-shell {0}
        working-directory: ARC
        env:
          MAMBA_ALWAYS_YES: "true"
          CONDA_ALWAYS_YES: "true"
        run: make install-ci

      - name: Set TS-GCN and AutoTST in PYTHONPATH
        shell: micromamba-shell {0}
        working-directory: ARC
        run: |
          echo "PYTHONPATH=$(realpath ../TS-GCN):$(realpath ../AutoTST):$PYTHONPATH" >> $GITHUB_ENV

      - name: Compile ARC molecule
        shell: micromamba-shell {0}
        working-directory: ARC
        env:
          ARC_COVERAGE: 1
        run: |
          make compile

      - name: Run Unit Tests
        shell: micromamba-shell {0}
        working-directory: ARC
        env:
          ARC_COVERAGE: 1
          CYTHON_TRACE: 1
        run: |
          echo "Running Unit Tests..."
          export PYTHONPATH="${{ github.workspace }}/AutoTST:${{ github.workspace }}/KinBot:$PYTHONPATH"
          pytest arc/ --cov --cov-report=xml -ra -vv -n auto

      - name: Run Functional Tests
        shell: micromamba-shell {0}
        working-directory: ${{ github.workspace }}/ARC
        env:
          ARC_COVERAGE: 1
          CYTHON_TRACE: 1
        run: |
          echo "Running Functional Tests from $(pwd)..."
          export PYTHONPATH="${{ github.workspace }}/AutoTST:${{ github.workspace }}/KinBot:$PYTHONPATH"
          pytest functional/ --cov --cov-append --cov-report=xml -ra -vv -n auto

      - name: Upload coverage data
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ARC/coverage.xml
          flags: unittests,functionaltests
          name: codecov-umbrella
          verbose: true
          fail_ci_if_error: false

  rits-install:
    name: RitS install (CPU lane)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout ARC
        uses: actions/checkout@v6
        with:
          path: ARC

      - name: Clean Ubuntu Image
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: bash

      - name: Restore RitS cache (clone + rits_env + checkpoint)
        id: rits-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/RitS
            ~/micromamba/envs/rits_env
          key: rits-cpu-${{ runner.os }}-${{ hashFiles('ARC/devtools/install_rits.sh') }}

      - name: Install RitS (CPU)
        shell: bash -el {0}
        working-directory: ${{ github.workspace }}
        run: |
          # Use the existing RitS clone from the cache if present, else clone fresh.
          if [[ -d RitS/.git ]]; then
            bash ARC/devtools/install_rits.sh --cpu --path "$PWD/RitS"
          else
            bash ARC/devtools/install_rits.sh --cpu
          fi

      - name: Smoke-test 'import megalodon' from rits_env
        shell: bash -el {0}
        run: |
          micromamba run -n rits_env python - <<'PYEOF'
          import megalodon, torch, torch_geometric
          print("megalodon:", megalodon.__file__)
          print("torch    :", torch.__version__)
          print("pyg      :", torch_geometric.__version__)
          print("cuda?    :", torch.cuda.is_available())
          PYEOF
