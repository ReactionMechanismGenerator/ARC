name: ts_gcn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - h5py
  - hyperopt
  - ipython
  - jupyter
  - matplotlib
  - numpy
  - openbabel
  - pandas
  - pip
  - psutil
  - py3dmol
  # - pymol
  - pyyaml
  - rdkit
  - scikit-learn
  - scipy
  - seaborn
  - tqdm
  - xlrd
  - xlwt
  # CPU-only PyTorch + PyTorch Geometric stack required by TS-GCN's inference module
  # (same known-good pins as devtools/install_gcn.sh in CPU mode).
  - pip:
      - --find-links https://download.pytorch.org/whl/torch_stable.html
      - --find-links https://pytorch-geometric.com/whl/torch-1.7.1+cpu.html
      - torch==1.7.1+cpu
      - torchvision==0.8.2+cpu
      - torchaudio==0.7.2
      - torch-scatter
      - torch-sparse
      - torch-cluster
      - torch-spline-conv
      - torch-geometric
