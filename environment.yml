name: arc_env
channels:
  - defaults
  - rmg
  - conda-forge
  - cantera
  - anaconda

dependencies:
  # ─── core versions (lock these) ────────────────
  - conda-forge::python >=3.9
  - conda-forge::numpy >=1.10.0,<2

  # ─── defaults ─────────────────────────────────
  - cairo
  - cairocffi
  - coolprop
  - coverage
  - ffmpeg
  - graphviz
  - h5py
  - jinja2
  - jupyter
  - markupsafe
  - matplotlib >=1.5
  - mpmath
  - networkx
  - pandas
  - psutil
  - pydot
  - pymongo
  - pyparsing
  - pyyaml
  - scikit-learn
  - scipy
  - xlrd
  - xlwt
  - mako
  - pytables

  # ─── rmg ──────────────────────────────────────
  - rmg::pydas >=1.0.3
  - rmg::pydqed >=1.0.3        # pairs with Py 3.9 + NumPy 1.26

  # ─── conda-forge ──────────────────────────────
  - conda-forge::cython >=0.25.2,<3.1
  - conda-forge::numdifftools      # no version cap needed
  - conda-forge::ringdecomposerlib-python
  - conda-forge::quantities        # no “!=0.16.*” needed after 0.17 bugfix
  - conda-forge::rdkit >=2022.09.1 # build exists for Py 3.9
  - conda-forge::cclib >=1.6.3,<1.9
  - conda-forge::mopac
  - conda-forge::openbabel >=3
  - conda-forge::py3dmol >=0.8.0
  - conda-forge::ase ==3.22.1
  - conda-forge::qcelemental
  - conda-forge::pytest-cov
  - conda-forge::gprof2dot
  - conda-forge::sphinx_rtd_theme
  - conda-forge::paramiko >=2.6.0
  - conda-forge::ipython
  - conda-forge::sphinx
  - conda-forge::sphinxcontrib-jsmath
  - conda-forge::pytest

  # ─── cantera ──────────────────────────────────
  - cantera::cantera =2.6         # build exists for Py 3.9

